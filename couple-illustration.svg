<svg viewBox="0 0 640 460" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Illustrated groom and bride couple">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FBF3E3"/>
      <stop offset="100%" stop-color="#F0DFC0"/>
    </linearGradient>
    <linearGradient id="hillGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B7C79A"/>
      <stop offset="100%" stop-color="#93A876"/>
    </linearGradient>
    <linearGradient id="gownGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F3E6C6"/>
      <stop offset="100%" stop-color="#E4D3A6"/>
    </linearGradient>
  </defs>

  <!-- sky -->
  <rect x="0" y="0" width="640" height="460" fill="url(#skyGrad)"/>
  <circle cx="500" cy="90" r="46" fill="#F6E3B0" opacity="0.75"/>

  <!-- rolling hills -->
  <path d="M0,300 Q120,250 260,285 T520,270 T640,290 L640,460 L0,460 Z" fill="url(#hillGrad)"/>
  <path d="M0,340 Q160,300 320,330 T640,320 L640,460 L0,460 Z" fill="#7C9564" opacity="0.9"/>

  <!-- wind turbines, echoing the photo's setting -->
  <g stroke="#F7F2E6" stroke-width="3" stroke-linecap="round" opacity="0.9">
    <line x1="90" y1="150" x2="90" y2="270"/>
    <g transform="translate(90,150)">
      <line x1="0" y1="0" x2="0" y2="-38"/>
      <line x1="0" y1="0" x2="33" y2="16"/>
      <line x1="0" y1="0" x2="-33" y2="16"/>
    </g>
    <line x1="560" y1="180" x2="560" y2="275"/>
    <g transform="translate(560,180)">
      <line x1="0" y1="0" x2="0" y2="-30"/>
      <line x1="0" y1="0" x2="26" y2="13"/>
      <line x1="0" y1="0" x2="-26" y2="13"/>
    </g>
    <line x1="200" y1="210" x2="200" y2="272" stroke-width="2"/>
    <g transform="translate(200,210)" stroke-width="2">
      <line x1="0" y1="0" x2="0" y2="-22"/>
      <line x1="0" y1="0" x2="19" y2="10"/>
      <line x1="0" y1="0" x2="-19" y2="10"/>
    </g>
  </g>

  <!-- ground the couple stands on -->
  <ellipse cx="320" cy="440" rx="230" ry="18" fill="#7C9564" opacity="0.55"/>

  <!-- ===== GROOM (left) ===== -->
  <g id="groom" transform="translate(230,150)">
    <!-- shadow -->
    <ellipse cx="0" cy="270" rx="46" ry="10" fill="#2A1F12" opacity="0.15"/>
    <!-- legs / trousers, full length to shoes -->
    <path d="M-24,150 L-30,270 L-8,270 L-6,180 L4,180 L8,270 L30,270 L24,150 Z" fill="#1D2030"/>
    <!-- shoes -->
    <rect x="-32" y="264" width="26" height="10" rx="4" fill="#0E0F16"/>
    <rect x="6" y="264" width="26" height="10" rx="4" fill="#0E0F16"/>
    <!-- jacket body -->
    <path d="M-40,60 Q0,42 40,60 L46,170 Q0,190 -46,170 Z" fill="#1D2030"/>
    <!-- lapels -->
    <path d="M-8,64 L-24,110 L-2,96 Z" fill="#14161F"/>
    <path d="M8,64 L24,110 L2,96 Z" fill="#14161F"/>
    <!-- shirt -->
    <path d="M-10,60 L0,86 L10,60 L4,54 L-4,54 Z" fill="#F7F2E6"/>
    <!-- bow tie -->
    <path d="M-10,58 L0,66 L-10,74 Z" fill="#B08D52"/>
    <path d="M10,58 L0,66 L10,74 Z" fill="#B08D52"/>
    <circle cx="0" cy="66" r="3.4" fill="#8E6E3A"/>
    <!-- arms -->
    <path d="M-40,66 Q-58,110 -50,160 L-36,158 Q-40,112 -28,74 Z" fill="#1D2030"/>
    <path d="M40,66 Q58,108 52,148 L38,150 Q42,110 28,74 Z" fill="#1D2030"/>
    <!-- hands -->
    <circle cx="-49" cy="163" r="8" fill="#E8B98C"/>
    <circle cx="50" cy="152" r="7" fill="#E8B98C"/>
    <!-- neck -->
    <rect x="-8" y="38" width="16" height="18" rx="6" fill="#E8B98C"/>
    <!-- head -->
    <circle cx="0" cy="22" r="26" fill="#EFC49A"/>
    <!-- hair -->
    <path d="M-26,14 Q-24,-10 0,-12 Q24,-10 26,14 Q18,-2 0,-2 Q-18,-2 -26,14 Z" fill="#2B1B11"/>
  </g>

  <!-- ===== BRIDE (right), slightly shorter overall, gown hem shorter than groom's trousers ===== -->
  <g id="bride" transform="translate(400,168)">
    <!-- shadow -->
    <ellipse cx="0" cy="252" rx="50" ry="10" fill="#2A1F12" opacity="0.15"/>
    <!-- veil, behind head -->
    <path d="M0,-6 Q-46,40 -30,150 Q0,120 30,150 Q46,40 0,-6 Z" fill="#FFFFFF" opacity="0.55"/>
    <!-- gown, A-line, hem sits higher (shorter) than groom's trouser hem -->
    <path d="M-16,58 Q0,44 16,58 L54,238 Q0,262 -54,238 Z" fill="url(#gownGrad)"/>
    <!-- gown sash -->
    <path d="M-16,60 Q0,72 16,60" stroke="#C9A44C" stroke-width="4" fill="none"/>
    <!-- shoes just visible at hem -->
    <ellipse cx="-14" cy="240" rx="12" ry="6" fill="#F3E6C6"/>
    <ellipse cx="14" cy="240" rx="12" ry="6" fill="#F3E6C6"/>
    <!-- arms -->
    <path d="M-16,64 Q-40,100 -34,150 L-20,148 Q-24,104 -4,72 Z" fill="url(#gownGrad)"/>
    <path d="M16,64 Q40,98 30,132 L16,130 Q22,100 4,72 Z" fill="url(#gownGrad)"/>
    <!-- hands / bouquet -->
    <circle cx="-34" cy="153" r="7" fill="#E8B98C"/>
    <circle cx="30" cy="135" r="7" fill="#E8B98C"/>
    <g transform="translate(-30,158)">
      <circle cx="0" cy="0" r="5" fill="#D8B36A"/>
      <circle cx="7" cy="-3" r="5" fill="#E4D3A6"/>
      <circle cx="-6" cy="-4" r="4.5" fill="#C9A44C"/>
      <circle cx="1" cy="-8" r="4.5" fill="#F3E6C6"/>
    </g>
    <!-- neck -->
    <rect x="-7" y="36" width="14" height="16" rx="6" fill="#EFC49A"/>
    <!-- head -->
    <circle cx="0" cy="20" r="24" fill="#F0C79C"/>
    <!-- hair, updo -->
    <path d="M-24,14 Q-22,-10 0,-12 Q22,-10 24,14 Q22,26 16,20 Q18,4 0,2 Q-18,4 -16,20 Q-22,26 -24,14 Z" fill="#3A2415"/>
    <circle cx="0" cy="-10" r="7" fill="#3A2415"/>
  </g>

  <!-- linked hands accent between them -->
  <circle cx="345" cy="316" r="5" fill="#E8B98C" opacity="0.9"/>
</svg>
